services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: asiana_va
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - va-net

  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/asiana_va
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-dev-secret-change-in-production}
      BOT_API_KEY: ${BOT_API_KEY:-dev-bot-key-change-me}
      DISCORD_CLIENT_ID: ${DISCORD_CLIENT_ID:-}
      DISCORD_CLIENT_SECRET: ${DISCORD_CLIENT_SECRET:-}
      DISCORD_REDIRECT_URI: ${DISCORD_REDIRECT_URI:-http://localhost:8000/api/auth/discord/callback}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      CORS_ORIGINS: '["http://localhost:3000"]'
      BRANDING_PATH: /app/branding.json
      ASSETS_PATH: /app/assets
      BOARDING_PASSES_PATH: /app/storage/boarding_passes
      DISCORD_WEBHOOK_URL: ${DISCORD_WEBHOOK_URL:-}
      DISCORD_BOT_TOKEN: ${DISCORD_BOT_TOKEN:-}
      DISCORD_GUILD_ID: ${DISCORD_GUILD_ID:-}
      DISCORD_ROLE_TRAINEE: ${DISCORD_ROLE_TRAINEE:-}
      DISCORD_ROLE_FIRST_OFFICER: ${DISCORD_ROLE_FIRST_OFFICER:-}
      DISCORD_ROLE_CAPTAIN: ${DISCORD_ROLE_CAPTAIN:-}
      DISCORD_ROLE_SENIOR_CAPTAIN: ${DISCORD_ROLE_SENIOR_CAPTAIN:-}
    volumes:
      - ./branding.json:/app/branding.json:ro
      - ./assets:/app/assets:ro
      - boarding_passes:/app/storage/boarding_passes
    depends_on:
      db:
        condition: service_healthy
    networks:
      - va-net

  web:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://api:8000}
    depends_on:
      - api
    networks:
      - va-net

  bot:
    build:
      context: .
      dockerfile: bot/Dockerfile
    environment:
      DISCORD_BOT_TOKEN: ${DISCORD_BOT_TOKEN:-}
      API_URL: http://api:8000
      BOT_API_KEY: ${BOT_API_KEY:-dev-bot-key-change-me}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      BRANDING_PATH: /app/branding.json
    volumes:
      - ./branding.json:/app/branding.json:ro
    depends_on:
      - api
    networks:
      - va-net
    profiles:
      - full

networks:
  va-net:
    driver: bridge

volumes:
  pgdata:
  boarding_passes:
